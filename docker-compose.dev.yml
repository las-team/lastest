# =============================================================================
# Lastest2 - Docker Compose for Development
# =============================================================================
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up
#
# With rebuild:
#   docker-compose -f docker-compose.dev.yml up --build
#
# =============================================================================

services:
  lastest2-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lastest2-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot reload
      - .:/app
      # Preserve node_modules from container
      - /app/node_modules
      - /app/.next
      # Persistent data
      - lastest2-dev-data:/app/data
    environment:
      - NODE_ENV=development
      - DATABASE_PATH=/app/data/lastest2.db
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      - CLERK_WEBHOOK_SIGNING_SECRET=${CLERK_WEBHOOK_SIGNING_SECRET:-}
    command: pnpm dev

volumes:
  lastest2-dev-data:
    driver: local
