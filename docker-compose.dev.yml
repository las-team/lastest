# =============================================================================
# Lastest - Docker Compose for Development
# =============================================================================
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up
#
# With rebuild:
#   docker-compose -f docker-compose.dev.yml up --build
#
# =============================================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: lastest-dev-db
    environment:
      POSTGRES_USER: lastest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lastest}
      POSTGRES_DB: lastest
    volumes:
      - lastest-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lastest"]
      interval: 5s
      timeout: 3s
      retries: 5

  lastest-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lastest-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot reload
      - .:/app
      # Preserve node_modules from container
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://lastest:${POSTGRES_PASSWORD:-lastest}@postgres:5432/lastest
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: pnpm dev

volumes:
  lastest-dev-pgdata:
    driver: local
