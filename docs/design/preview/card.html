<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft);padding:20px}
.card{background:#fff;border:1px solid var(--c-line);border-radius:8px;padding:20px;box-shadow:0px 2px 4px rgba(31,42,51,.06)}
.hdr{font-family:var(--font-sans);font-weight:600;font-size:18px;color:var(--fg-1);margin:0 0 4px}
.desc{font-family:var(--font-sans);font-size:13px;color:var(--fg-2);margin:0 0 14px}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--c-line)}
.row:last-child{border-bottom:none}
.k{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em}
.v{font-family:var(--font-mono);font-size:13px;color:var(--fg-1)}</style></head>
<body><div class="card">
<h3 class="hdr">Build #a1f2c8d4</h3><p class="desc">main · 2 minutes ago</p>
<div class="row"><span class="k">Tests</span><span class="v">24</span></div>
<div class="row"><span class="k">Pass rate</span><span class="v" style="color:#36A88E">99.4%</span></div>
<div class="row"><span class="k">Status</span><span class="v" style="color:#E03E36">2 regressions</span></div>
</div></body></html>
