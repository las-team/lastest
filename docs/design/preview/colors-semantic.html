<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft);padding:18px}
.row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px dashed var(--c-line)}
.row:last-child{border-bottom:none}
.dot{width:32px;height:32px;border-radius:6px;flex-shrink:0}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em;width:90px}
.name{font-family:var(--font-sans);font-weight:500;font-size:14px;color:var(--fg-1);width:80px}
.use{font-family:var(--font-sans);font-size:13px;color:var(--fg-2);flex:1}</style></head>
<body>
<div class="row"><div class="dot" style="background:#36A88E"></div><div class="lbl">--action</div><div class="name">Teal</div><div class="use">Primary CTA · Pass · Success</div></div>
<div class="row"><div class="dot" style="background:#3674A8"></div><div class="lbl">--info</div><div class="name">Steel Blue</div><div class="use">Secondary CTA · Links · Info</div></div>
<div class="row"><div class="dot" style="background:#E09836"></div><div class="lbl">--accent</div><div class="name">Amber</div><div class="use">Focus rings · Warning · Highlight</div></div>
<div class="row"><div class="dot" style="background:#E03E36"></div><div class="lbl">--danger</div><div class="name">Red</div><div class="use">Brand mark only · Regression · Destructive</div></div>
</body></html>
