<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft);padding:24px;display:flex;gap:18px;align-items:center;height:calc(100vh - 48px)}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1}
.box{width:80px;height:54px;background:#fff;border-radius:8px}
.lbl{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em}
.name{font-family:var(--font-sans);font-weight:500;font-size:13px;color:var(--fg-1)}</style></head>
<body>
<div class="cell"><div class="box" style="box-shadow:0px 1px 2px rgba(31,42,51,.05)"></div><div class="name">xs</div><div class="lbl">inputs</div></div>
<div class="cell"><div class="box" style="box-shadow:0px 2px 4px rgba(31,42,51,.06)"></div><div class="name">sm</div><div class="lbl">cards rest</div></div>
<div class="cell"><div class="box" style="box-shadow:0px 4px 12px rgba(31,42,51,.08)"></div><div class="name">md</div><div class="lbl">hover</div></div>
<div class="cell"><div class="box" style="box-shadow:0px 12px 28px rgba(31,42,51,.12)"></div><div class="name">lg</div><div class="lbl">popovers</div></div>
</body></html>
