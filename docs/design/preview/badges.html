<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft);padding:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.b{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-weight:500;font-size:12px;padding:3px 10px;border-radius:999px;border:1px solid transparent}
.lbl{font-family:var(--font-mono);font-size:9px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.06em;width:100%}
.dot{width:6px;height:6px;border-radius:50%}
.b svg{width:11px;height:11px;stroke-width:2.4}</style></head>
<body>
<span class="lbl">Build status badges — distinct shape per state</span>
<span class="b" style="background:rgba(54,168,142,.14);color:#1F6B59"><span class="dot" style="background:#36A88E"></span>safe_to_merge</span>
<span class="b" style="background:rgba(224,152,54,.18);color:#8C5C16"><span class="dot" style="background:#E09836"></span>review_required</span>
<span class="b" style="background:rgba(224,62,54,.14);color:#A82A24"><span class="dot" style="background:#E03E36"></span>blocked</span>
<span class="b" style="background:rgba(224,152,54,.10);color:#8C5C16;border-style:dashed;border-color:rgba(224,152,54,.55)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>flaky</span>
<span class="b" style="background:rgba(54,116,168,.14);color:#235479"><span class="dot" style="background:#3674A8"></span>running</span>
<span class="b" style="background:#1F2A33;color:#fff">v1.0.0</span>
<span class="b" style="background:#fff;color:#1F2A33;border-color:var(--c-line-strong)">outline</span>
</body></html>
