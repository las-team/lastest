<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft);padding:24px;display:flex;gap:24px;align-items:center;height:calc(100vh - 48px)}
.cell{display:flex;flex-direction:column;align-items:center;gap:10px;flex:1}
.bg{width:120px;height:120px;display:flex;align-items:center;justify-content:center;border:1px solid var(--c-line)}
.lbl{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em;text-align:center}</style></head>
<body>
<div class="cell"><div class="bg" style="background:#F6F6F4"><img src="../assets/delta-mark.svg" width="80" height="80"/></div><div class="lbl">Primary · Soft</div></div>
<div class="cell"><div class="bg" style="background:#fff"><img src="../assets/delta-mark.svg" width="80" height="80"/></div><div class="lbl">White</div></div>
<div class="cell"><div class="bg" style="background:#1F2A33"><img src="../assets/delta-mark-dark.svg" width="80" height="80"/></div><div class="lbl">Dark</div></div>
<div class="cell"><div class="bg" style="background:#F6F4EF"><img src="../assets/delta-mark-mono.svg" width="80" height="80"/></div><div class="lbl">Monochrome</div></div>
</body></html>
