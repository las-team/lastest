<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        background: var(--c-soft);
        padding: 24px;
      }
      .h {
        display: flex;
        height: 36px;
        width: 100%;
        font-family: var(--font-mono);
        font-size: 10px;
        color: #fff;
        align-items: center;
        justify-content: center;
        letter-spacing: 0.05em;
      }
      .cap {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--fg-3);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
      }
      .note {
        font-family: var(--font-sans);
        font-size: 12px;
        color: var(--fg-2);
        margin-top: 10px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="cap">Recommended usage ratio</div>
    <div class="h">
      <div
        style="
          flex: 60;
          background: #f6f6f4;
          color: #1f2a33;
          border: 1px solid var(--c-line);
        "
      >
        60% · NEUTRALS
      </div>
      <div style="flex: 18; background: #1f2a33">18% · INK</div>
      <div style="flex: 12; background: #e03e36">12% · RED (mark only)</div>
      <div style="flex: 5; background: #e09836; color: #1f2a33">5%</div>
      <div style="flex: 3; background: #36a88e"></div>
      <div style="flex: 2; background: #3674a8"></div>
    </div>
    <div class="note">
      Neutrals dominate. Red is reserved for the Delta Mark and regression
      alerts. Teal/Blue carry actions.
    </div>
  </body>
</html>
