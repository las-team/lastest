<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft)}.card{padding:20px;display:flex;gap:14px;height:130px}
.swatch{flex:1;height:90px;display:flex;flex-direction:column;justify-content:space-between;padding:10px;border:1px solid var(--c-line)}
.swatch .n{font-family:var(--font-sans);font-weight:600;font-size:13px;color:#1F2A33}
.swatch .h{font-family:var(--font-mono);font-size:10px;color:rgba(31,42,51,.6)}</style></head>
<body><div class="card">
<div class="swatch" style="background:#FFFFFF"><span class="label">S1 · HIGH-CONTRAST</span><div><div class="n">White</div><div class="h">#FFFFFF</div></div></div>
<div class="swatch" style="background:#F6F6F4"><span class="label">S2 · STANDARD APP BG</span><div><div class="n">Soft</div><div class="h">#F6F6F4</div></div></div>
<div class="swatch" style="background:#F6F4EF"><span class="label">S3 · WARM PAPER</span><div><div class="n">Paper</div><div class="h">#F6F4EF</div></div></div>
<div class="swatch" style="background:#1F2A33"><span class="label" style="color:rgba(255,255,255,.55)">S4 · DARK</span><div><div class="n" style="color:#fff">Ink</div><div class="h" style="color:rgba(255,255,255,.7)">#1F2A33</div></div></div>
</div></body></html>
