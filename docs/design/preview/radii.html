<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft);padding:20px;display:flex;gap:14px;align-items:center;height:calc(100vh - 40px)}
.cell{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1}
.box{width:78px;height:78px;background:#fff;border:1px solid var(--c-line)}
.lbl{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.05em}
.name{font-family:var(--font-sans);font-weight:500;font-size:13px;color:var(--fg-1)}</style></head>
<body>
<div class="cell"><div class="box" style="border-radius:4px"></div><div class="name">xs · default</div><div class="lbl">4px</div></div>
<div class="cell"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="lbl">6px</div></div>
<div class="cell"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="lbl">8px</div></div>
<div class="cell"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="lbl">12px</div></div>
<div class="cell"><div class="box" style="border-radius:999px"></div><div class="name">pill · badges</div><div class="lbl">999</div></div>
<div class="cell"><div class="box" style="border-radius:0;background:#E03E36;border:none"></div><div class="name">mark · 0</div><div class="lbl">core</div></div>
</body></html>
