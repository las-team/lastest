<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft);padding:20px;display:flex;align-items:flex-end;gap:16px;height:calc(100vh - 40px)}
.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{background:#1F2A33;border-radius:6px}
.lbl{font-family:var(--font-mono);font-size:9px;color:var(--fg-3);letter-spacing:.04em}</style></head>
<body>
<div class="cell"><div class="box" style="width:4px;height:4px"></div><div class="lbl">4 · sp1</div></div>
<div class="cell"><div class="box" style="width:8px;height:8px"></div><div class="lbl">8 · sp2</div></div>
<div class="cell"><div class="box" style="width:12px;height:12px"></div><div class="lbl">12 · sp3</div></div>
<div class="cell"><div class="box" style="width:16px;height:16px"></div><div class="lbl">16 · sp4</div></div>
<div class="cell"><div class="box" style="width:24px;height:24px"></div><div class="lbl">24 · sp5</div></div>
<div class="cell"><div class="box" style="width:32px;height:32px"></div><div class="lbl">32 · sp6</div></div>
<div class="cell"><div class="box" style="width:48px;height:48px"></div><div class="lbl">48 · sp7</div></div>
<div class="cell"><div class="box" style="width:64px;height:64px"></div><div class="lbl">64 · sp8</div></div>
</body></html>
