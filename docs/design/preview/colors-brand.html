<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0;background:var(--c-soft)}.card{padding:20px;display:flex;gap:14px;align-items:center;height:130px}
.swatch{flex:1;height:90px;display:flex;flex-direction:column;justify-content:space-between;padding:10px}
.swatch .n{font-family:var(--font-sans);font-weight:600;font-size:13px}
.swatch .h{font-family:var(--font-mono);font-size:10px;opacity:.85}</style></head>
<body><div class="card">
<div class="swatch" style="background:#E03E36;color:#fff"><span class="label" style="color:rgba(255,255,255,.7)">BRAND</span><div><div class="n">Red</div><div class="h">#E03E36</div></div></div>
<div class="swatch" style="background:#E09836;color:#1F2A33"><span class="label">ACCENT</span><div><div class="n">Amber</div><div class="h">#E09836</div></div></div>
<div class="swatch" style="background:#36A88E;color:#fff"><span class="label" style="color:rgba(255,255,255,.7)">ACTION</span><div><div class="n">Teal</div><div class="h">#36A88E</div></div></div>
<div class="swatch" style="background:#3674A8;color:#fff"><span class="label" style="color:rgba(255,255,255,.7)">INFO</span><div><div class="n">Steel Blue</div><div class="h">#3674A8</div></div></div>
<div class="swatch" style="background:#1F2A33;color:#fff"><span class="label" style="color:rgba(255,255,255,.55)">TYPE</span><div><div class="n">Ink</div><div class="h">#1F2A33</div></div></div>
</div></body></html>
