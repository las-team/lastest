<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lastest Users</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .widget {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px 32px;
      text-align: center;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .label {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    .count {
      color: #4fc3f7;
      font-size: 48px;
      font-weight: 700;
      line-height: 1;
      transition: opacity 0.3s;
    }
    .count.loading { opacity: 0.4; }
    .count.error { color: #ef5350; font-size: 14px; }
    .updated {
      color: rgba(255,255,255,0.3);
      font-size: 10px;
      margin-top: 8px;
    }
    .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4caf50;
      margin-right: 6px;
      vertical-align: middle;
    }
    .dot.offline { background: #ef5350; }
  </style>
</head>
<body>
  <div class="widget">
    <div class="label">Lastest Users</div>
    <div class="count loading" id="count">—</div>
    <div class="updated" id="updated"><span class="dot" id="dot"></span>connecting...</div>
  </div>

  <script>
    // ─── CONFIG ───────────────────────────────────────
    // Set these, or pass as URL params: ?url=...&key=...
    const params = new URLSearchParams(window.location.search);
    const API_URL = params.get('url') || 'https://app.lastest.cloud/api/stats';
    const API_KEY = params.get('key') || '';
    const POLL_SECONDS = parseInt(params.get('poll') || '60', 10);
    // ──────────────────────────────────────────────────

    const countEl = document.getElementById('count');
    const updatedEl = document.getElementById('updated');
    const dotEl = document.getElementById('dot');

    async function fetchCount() {
      try {
        const res = await fetch(API_URL, {
          headers: API_KEY ? { 'Authorization': `Bearer ${API_KEY}` } : {},
        });
        if (!res.ok) throw new Error(`${res.status}`);
        const data = await res.json();
        countEl.textContent = data.users;
        countEl.className = 'count';
        dotEl.className = 'dot';
        const time = new Date(data.timestamp).toLocaleTimeString();
        updatedEl.innerHTML = `<span class="dot"></span>${time}`;
      } catch (e) {
        countEl.textContent = e.message || 'offline';
        countEl.className = 'count error';
        dotEl.className = 'dot offline';
        updatedEl.innerHTML = `<span class="dot offline"></span>failed`;
      }
    }

    fetchCount();
    setInterval(fetchCount, POLL_SECONDS * 1000);
  </script>
</body>
</html>
