# =============================================================================
# Lastest - Cloud Deployment with Embedded Browser Replicas
# =============================================================================
#
# Usage:
#   SYSTEM_EB_TOKEN=<secret> BETTER_AUTH_SECRET=<secret> docker compose -f docker-compose.cloud.yml up -d
#
# The main app runs with DISABLE_LOCAL_RUNNER=true.
# Embedded browsers auto-register as system runners via SYSTEM_EB_TOKEN.
# Users connect their own remote runners; system EBs serve as fallback.
#
# Fallback chain: team runner → system EB → queue and wait
#
# =============================================================================

services:
  postgres:
    image: postgres:17-alpine
    container_name: lastest-cloud-db
    environment:
      POSTGRES_USER: lastest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lastest}
      POSTGRES_DB: lastest
    volumes:
      - lastest-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lastest"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - lastest-net

  lastest:
    image: ewyc/lastest:latest
    container_name: lastest
    ports:
      - "3000:3000"
    volumes:
      - lastest-storage:/app/storage
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://lastest:${POSTGRES_PASSWORD:-lastest}@postgres:5432/lastest
      - EXECUTION_MODE=runner
      - DISABLE_LOCAL_RUNNER=true
      - SYSTEM_EB_TOKEN=${SYSTEM_EB_TOKEN:?SYSTEM_EB_TOKEN is required}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - lastest-net

  embedded-browser:
    image: ewyc/lastest-eb:latest
    build:
      context: .
      dockerfile: packages/embedded-browser/Dockerfile
    deploy:
      replicas: 5
    environment:
      - LASTEST_URL=http://lastest:3000
      - SYSTEM_EB_TOKEN=${SYSTEM_EB_TOKEN:?SYSTEM_EB_TOKEN is required}
      - STREAM_PORT=9223
    depends_on:
      lastest:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lastest-net

networks:
  lastest-net:
    driver: bridge

volumes:
  lastest-pgdata:
    driver: local
  lastest-storage:
    driver: local
