# =============================================================================
# Lastest2 - Docker Compose for Home Server Deployment
# =============================================================================
#
# Quick start:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f
#
# Stop:
#   docker-compose down
#
# =============================================================================

services:
  lastest2:
    image: ewyc/lastest:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lastest2
    ports:
      - "3000:3000"
    volumes:
      - lastest2-data:/app/data
      - lastest2-storage:/app/storage
      - lastest2-claude-auth:/home/nextjs/.claude
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/lastest2.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - lastest2-net

  embedded-browser:
    build:
      context: .
      dockerfile: packages/embedded-browser/Dockerfile
    environment:
      - LASTEST2_URL=http://lastest2:3000
      - LASTEST2_TOKEN=${EMBEDDED_RUNNER_TOKEN:-}
      - STREAM_PORT=9223
      - STREAM_AUTH_TOKEN=${STREAM_AUTH_TOKEN:-}
    deploy:
      replicas: ${EMBEDDED_REPLICAS:-1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9224/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - lastest2-net

networks:
  lastest2-net:
    driver: bridge

volumes:
  lastest2-data:
    driver: local
  lastest2-storage:
    driver: local
  lastest2-claude-auth:
    driver: local
