# =============================================================================
# Lastest2 - Docker Compose for Home Server Deployment
# =============================================================================
#
# Quick start:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f
#
# Stop:
#   docker-compose down
#
# =============================================================================

services:
  lastest2:
    image: ewyc/lastest:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lastest2
    ports:
      - "3000:3000"
    volumes:
      - lastest2-data:/app/data
      - lastest2-storage:/app/storage
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/lastest2.db
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:?CLERK_SECRET_KEY is required}
      - CLERK_WEBHOOK_SIGNING_SECRET=${CLERK_WEBHOOK_SIGNING_SECRET:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  lastest2-data:
    driver: local
  lastest2-storage:
    driver: local
