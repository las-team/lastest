services:
  db:
    image: postgres:17-alpine
    container_name: lastest-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lastest
      POSTGRES_PASSWORD: lastest
      POSTGRES_DB: lastest
    ports:
      - "5432:5432"
    volumes:
      - lastest-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lastest -d lastest"]
      interval: 5s
      timeout: 3s
      retries: 10
    labels:
      com.docker.compose.project: lastest

  # Optional OCR offload container (profile "ocr"):
  #   pnpm ocr:up   — builds the package + image and starts it
  # Then set OCR_SERVICE_URL=http://localhost:8891 in .env.local.
  # Without the profile, `docker compose up -d` starts only postgres and the
  # app runs Tesseract in-process as before.
  ocr:
    profiles: ["ocr"]
    build:
      context: .
      dockerfile: packages/ocr-service/Dockerfile
    image: lastest-ocr-service:latest
    container_name: lastest-dev-ocr
    restart: unless-stopped
    ports:
      - "8891:8891"
    environment:
      OCR_IDLE_TIMEOUT_MS: "120000"
      OCR_MAX_WORKERS: "2"
    labels:
      com.docker.compose.project: lastest

volumes:
  lastest-pgdata:
    name: lastest-pgdata
