# =============================================================================
# Lastest2 - Embedded Browser (Local Development)
# =============================================================================
#
# Runs EB instances alongside a local dev server (localhost:3000).
# Uses host networking so EBs can reach the dev server directly.
#
# Usage:
#   docker compose -f docker-compose.eb.yml up -d
#   docker compose -f docker-compose.eb.yml up -d --build   # rebuild image
#   docker compose -f docker-compose.eb.yml down
#   docker compose -f docker-compose.eb.yml logs -f
#
# Tokens must match SYSTEM_EB_TOKEN in your .env (comma-separated list).
# =============================================================================

services:
  eb-1:
    image: lastest2-embedded-browser
    build:
      context: .
      dockerfile: packages/embedded-browser/Dockerfile
    container_name: lastest2-embedded-browser-1
    network_mode: host
    environment:
      - LASTEST2_URL=http://localhost:3000
      - SYSTEM_EB_TOKEN=2c0eb9c62caaa0dac8ece295c1c985d6c0dbfb81cd1d9e7516ee5ba8a8083f98
      - STREAM_HOST=localhost
      - STREAM_PORT=9223
      - INSTANCE_ID=eb-1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9224/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  eb-2:
    image: lastest2-embedded-browser
    build:
      context: .
      dockerfile: packages/embedded-browser/Dockerfile
    container_name: lastest2-embedded-browser-2
    network_mode: host
    environment:
      - LASTEST2_URL=http://localhost:3000
      - SYSTEM_EB_TOKEN=898e8bd52bcb6280aadc754b94f7425ab0a02863fe4c76a9e6a4d038c4535eaf
      - STREAM_HOST=localhost
      - STREAM_PORT=9225
      - INSTANCE_ID=eb-2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9226/health"]
      interval: 10s
      timeout: 5s
      retries: 3
