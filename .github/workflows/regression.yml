name: Visual Regression Tests

on:
  pull_request:
    branches: [main]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Run visual regression tests
        id: visual
        uses: dexilion-team/lastest2-action@v1
        with:
          server-url: ${{ secrets.LASTEST_SERVER_URL }}
          runner-token: ${{ secrets.LASTEST_RUNNER_TOKEN }}
          repo-id: ${{ vars.LASTEST_REPO_ID }}
          team-id: ${{ vars.LASTEST_TEAM_ID }}
          runner-id: ${{ vars.LASTEST_RUNNER_ID }}
          timeout: '300'
          fail-on-changes: 'false'

      - name: Summary
        if: always() && steps.visual.outputs.status != ''
        run: |
          STATUS="${{ steps.visual.outputs.status }}"
          if [ "$STATUS" = "passed" ] || [ "$STATUS" = "safe_to_merge" ]; then
            EMOJI="✅"
          elif [ "$STATUS" = "review_required" ]; then
            EMOJI="⚠️"
          else
            EMOJI="❌"
          fi

          echo "## ${EMOJI} Visual Regression Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | **${STATUS}** |" >> $GITHUB_STEP_SUMMARY
          echo "| Passed | ${{ steps.visual.outputs.passed-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Failed | ${{ steps.visual.outputs.failed-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Changes | ${{ steps.visual.outputs.changed-count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Total | ${{ steps.visual.outputs.total-tests }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Results](${{ steps.visual.outputs.build-url }})" >> $GITHUB_STEP_SUMMARY
