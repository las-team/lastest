name: Visual Regression Tests

on:
  pull_request:
    branches: [main]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Run visual regression tests
        # --server      Lastest2 server URL (required)
        # --token       Runner auth token (required)
        # --repo        Repository to test, e.g. "owner/repo" (required)
        # --target-url  Override base URL for tests (optional)
        # --branch      Auto-detected from GITHUB_HEAD_REF
        # --commit      Auto-detected from GITHUB_SHA
        # --timeout     Build timeout in ms (default: 300000)
        # --fail-on-changes  Exit 1 on visual changes (optional)
        run: |
          npx @lastest/runner@latest trigger \
            --repo "${{ github.repository }}" \
            --server "${{ secrets.LASTEST_SERVER_URL }}" \
            --token "${{ secrets.LASTEST_RUNNER_TOKEN }}"
