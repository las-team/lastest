name: Lastest2 Visual Tests
on:
  pull_request:
  workflow_dispatch:
jobs:
  visual-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run visual tests
        env:
          LASTEST2_TOKEN: ${{ secrets.LASTEST2_TOKEN }}
          LASTEST2_URL: ${{ secrets.LASTEST2_URL }}
        run: |
          npx @lastest/runner trigger \
            --repo "dexilion-team/lastest2" \
            --branch "${{ github.head_ref || github.ref_name }}" \
            --commit "${{ github.sha }}" \
            --timeout 300000 \
            --target-url "https://admin.lastest.cloud/"
