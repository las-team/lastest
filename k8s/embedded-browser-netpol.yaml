# NetworkPolicy: restrict Embedded Browser pod egress.
#
# EB pods run arbitrary, user/AI-authored Playwright code (that is the product).
# They legitimately need to reach the host app callback (LASTEST_URL) and the
# public internet (the sites under test), but they must NEVER reach the cloud
# metadata service (169.254.169.254 — IAM credentials on AWS/GCP/Azure). This
# also defends the URL-diff / capture DNS-rebinding TOCTOU: even if a target
# hostname re-resolves to a metadata/link-local address inside the pod after the
# app's pre-flight SSRF check, egress to that range is dropped here.
#
# IMPORTANT:
#   - This is enforced ONLY by a CNI that implements NetworkPolicy (Calico,
#     Cilium, etc.). The default k3d/flannel CNI does NOT enforce it — it is a
#     safe no-op there. Run an enforcing CNI in any multi-tenant deployment.
#   - The host callback (host.k3d.internal / a LAN homeserver) sits on a private
#     RFC1918 address, so we deliberately do NOT blanket-deny private ranges —
#     that would cut the EB off from the app. We deny only the link-local /
#     metadata range, which no legitimate EB traffic targets. If you want to
#     also block other internal services, add their CIDRs to `except` below and
#     keep an explicit allow rule for your host CIDR.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lastest-eb-egress
  namespace: lastest
  labels:
    app: lastest-eb
spec:
  podSelector:
    matchLabels:
      app: lastest-eb
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution (kube-dns / CoreDNS).
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow all other egress EXCEPT the link-local / cloud-metadata range.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 169.254.0.0/16 # link-local incl. 169.254.169.254 metadata
              - 127.0.0.0/8 # loopback (node-local services)
